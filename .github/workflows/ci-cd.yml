name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - "api/**"
      - "client/**"
      - "docker/**"
      - "docker-compose*.yml"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "api/**"
      - "client/**"
      - "docker/**"
      - "docker-compose*.yml"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  code_lint:
    runs-on: ubuntu-latest
    name: Run code linters

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Composer cache directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: dom, curl, mbstring, pdo, sqlite, pdo_sqlite
          tools: composer:v2
          coverage: none

      - name: Prepare the environment
        working-directory: ./api
        run: cp .env.example .env

      - name: Install composer dependencies
        working-directory: ./api
        run: composer install --prefer-dist --no-interaction --no-progress --no-scripts --ignore-platform-reqs --optimize-autoloader

      - name: Run PHP lint check
        working-directory: ./api
        run: ./vendor/bin/pint --test

  client_checks:
    runs-on: ubuntu-latest
    name: Run client linters, tests, and build
    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.17.0"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install npm dependencies
        run: npm ci --no-audit --no-progress --silent

      - name: Run ESLint
        run: npm run lint

      - name: Run front-end tests
        run: npm run test -- --run

      - name: Prepare the environment
        run: cp .env.example .env

      - name: Build client
        run: npm run build:e2e
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Upload Nuxt Output Artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: nuxt-output
          path: client/.output
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  sync_check:
    runs-on: ubuntu-latest
    name: Verify shared files are in sync
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check file sync
        run: |
          check_sync() {
            local client_file=$1
            local api_file=$2
            
            if [ ! -f "$client_file" ]; then
              echo "❌ ERROR: Client file missing: $client_file"
              return 1
            fi
            
            if [ ! -f "$api_file" ]; then
              echo "❌ ERROR: API file missing: $api_file"
              return 1
            fi
            
            if ! diff -q "$client_file" "$api_file" > /dev/null; then
              echo "❌ ERROR: Files differ:"
              echo "   Client: $client_file"
              echo "   API:    $api_file"
              echo ""
              echo "Diff:"
              diff "$client_file" "$api_file" || true
              return 1
            else
              echo "✅ Files in sync: $client_file ↔ $api_file"
              return 0
            fi
          }
          
          failed=false
          
          check_sync "client/data/blocks_types.json" "api/resources/data/forms/blocks_types.json" || failed=true
          check_sync "client/data/forms/integrations.json" "api/resources/data/forms/integrations.json" || failed=true
          check_sync "client/test/fixtures/formula-parity-tests.json" "api/tests/fixtures/formula-parity-tests.json" || failed=true
          
          if [ "$failed" = true ]; then
            echo ""
            echo "⚠️  Some shared files are out of sync!"
            echo "Please ensure both copies are identical and commit the changes."
            exit 1
          fi
          
          echo ""
          echo "✅ All shared files are in sync!"

  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        # Docker Hub image
        image: postgres:14
        # Provide the password for postgres
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps tcp port 5432 on service container to the host
          - 5432:5432
      mysql:
        # Docker Hub image
        image: mysql:8
        # Provide the password for mysql
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: test
          MYSQL_USER: test
          MYSQL_PASSWORD: test
        # Set health checks to wait until mysql has started
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          # Maps tcp port 3306 on service container to the host
          - 3306:3306

    strategy:
      fail-fast: true
      matrix:
        php: [8.3]
        connection: [pgsql, mysql]
        include:
          - connection: pgsql
            host: localhost
            port: 5432
            user: postgres
            password: postgres
            database: postgres
          - connection: mysql
            host: "127.0.0.1"
            port: 3306
            user: root
            password: test
            database: test

    name: Run Feature & Unit tests (PHP ${{ matrix.php }} - ${{ matrix.connection }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Composer cache directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, mbstring, pdo, sqlite, pdo_sqlite
          tools: composer:v2
          coverage: none

      - name: Prepare the environment
        run: cp api/.env.example api/.env

      - name: Install composer dependencies
        working-directory: ./api
        run: composer install --prefer-dist --no-interaction --no-progress --ignore-platform-reqs --optimize-autoloader

      - name: Directory permissions
        working-directory: ./api
        run: chmod -R 777 storage bootstrap/cache

      - name: Run tests (Unit and Feature)
        working-directory: ./api
        run: ./vendor/bin/pest -p
        env:
          DB_CONNECTION: ${{ matrix.connection }}
          DB_HOST: ${{ matrix.host }}
          DB_PORT: ${{ matrix.port }}
          DB_DATABASE: ${{ matrix.database }}
          DB_USERNAME: ${{ matrix.user }}
          DB_PASSWORD: ${{ matrix.password }}

      - name: "Archive log results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-results-${{ matrix.connection }}
          path: api/storage/logs/laravel.log
          retention-days: 3

  required-tests-pgsql:
    needs: tests
    runs-on: ubuntu-latest
    name: Run Feature & Unit tests (PHP 8.2 - pgsql)
    steps:
      - run: echo "PHP 8.3 pgsql tests passed in the tests matrix."

  required-tests-mysql:
    needs: tests
    runs-on: ubuntu-latest
    name: Run Feature & Unit tests (PHP 8.2 - mysql)
    steps:
      - run: echo "PHP 8.3 mysql tests passed in the tests matrix."

  e2e:
    runs-on: ubuntu-latest
    needs: [client_checks, tests]
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_pgsql, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.17.0"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('client/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install composer dependencies
        working-directory: ./api
        run: composer install --prefer-dist --no-interaction --no-progress --ignore-platform-reqs --optimize-autoloader

      - name: Install npm dependencies
        working-directory: ./client
        run: npm ci --no-audit --no-progress --silent

      - name: Download Nuxt Output Artifact
        uses: actions/download-artifact@v4
        with:
          name: nuxt-output
          path: client/.output

      - name: Install Playwright Browsers
        working-directory: ./client
        run: npx playwright install --with-deps chromium

      - name: Start E2E Stack
        run: ./scripts/e2e-up.sh

      - name: Reset E2E Database
        run: ./scripts/e2e-reset.sh

      - name: Run Playwright E2E Tests
        working-directory: ./client
        env:
          CI: true
          PLAYWRIGHT_NO_WEB_SERVER: "1"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3100
          PLAYWRIGHT_API_BASE_URL: http://127.0.0.1:8089
          PLAYWRIGHT_WORKERS: "2"
        shell: bash
        run: |
          set -a
          . ./.env.e2e
          set +a

          cleanup() {
            local exit_code=$?

            if [ "$exit_code" -ne 0 ]; then
              docker compose -f ../docker-compose.e2e.yml logs --no-color > ../e2e-docker.log || true
              if [ -f ../.e2e-ui.log ]; then
                cp ../.e2e-ui.log ../e2e-ui.log || true
              fi
            fi

            if [ -f ../.e2e-ui.pid ]; then
              kill "$(cat ../.e2e-ui.pid)" || true
            fi

            exit "$exit_code"
          }

          trap cleanup EXIT

          NITRO_HOST=127.0.0.1 NITRO_PORT=${NUXT_PORT:-3100} \
            node --require ./scripts/e2e-runtime-guard.cjs .output/server/index.mjs > ../.e2e-ui.log 2>&1 &
          echo $! > ../.e2e-ui.pid

          for attempt in $(seq 1 90); do
            login_html="$(curl -fsS http://127.0.0.1:3100/login || true)"
            register_html="$(curl -fsS http://127.0.0.1:3100/register || true)"

            if printf '%s' "$login_html" | grep -q 'data-testid="login-page"' \
              && printf '%s' "$register_html" | grep -q 'data-testid="register-page"'; then
              break
            fi
            sleep 2
          done

          login_html="$(curl -fsS http://127.0.0.1:3100/login || true)"
          register_html="$(curl -fsS http://127.0.0.1:3100/register || true)"

          if ! printf '%s' "$login_html" | grep -q 'data-testid="login-page"' \
            || ! printf '%s' "$register_html" | grep -q 'data-testid="register-page"'; then
            echo "Nuxt E2E UI did not become ready for auth routes in time." >&2
            if [ -f ../.e2e-ui.log ]; then
              cat ../.e2e-ui.log >&2
            fi
            exit 1
          fi

          npm run test:e2e

      - name: Capture E2E Stack Logs
        if: ${{ failure() && !cancelled() }}
        run: |
          docker compose -f docker-compose.e2e.yml logs --no-color > e2e-docker.log
          if [ -f .e2e-ui.log ]; then
            cp .e2e-ui.log e2e-ui.log
          fi

      - name: Upload Playwright HTML Report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: .playwright/playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright Test Results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: .playwright/test-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload E2E Debug Logs
        if: ${{ failure() && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-debug-logs
          path: |
            e2e-docker.log
            e2e-ui.log
          if-no-files-found: ignore
          retention-days: 14

  production-deploy:
    needs: [code_lint, client_checks, sync_check, tests, e2e]
    if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Triggers Deployment (Vapor & Amplify)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Composer cache directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: dom, curl, mbstring, pdo, sqlite, pdo_sqlite
          tools: composer:v2
          coverage: none

      - name: Prepare the environment
        working-directory: ./api
        run: cp .env.example .env

      - name: Install composer dependencies
        working-directory: ./api
        run: composer install --prefer-dist --no-dev --no-interaction --no-progress --ignore-platform-reqs --optimize-autoloader

      - name: Directory permissions
        working-directory: ./api
        run: chmod -R 777 storage bootstrap/cache

      - name: Trigger front-end deployment
        run: |
          URL="${{ secrets.AMPLIFY_DEPLOY_URL }}"
          curl -X POST -d {} "$URL" -H "Content-Type: application/json"

      - name: Created encrypted .env file before deployment
        working-directory: ./api
        run: |
          echo "${{ secrets.ENCRYPTED_ENV_FILE }}" >> .env.production.encrypted

      - name: Deploy back-end to production
        working-directory: ./api
        run: php vendor/bin/vapor deploy api-production --commit="${GITHUB_SHA}" --message="${GITHUB_REF}"
        env:
          VAPOR_API_TOKEN: ${{ secrets.VAPOR_API_TOKEN }}

  publish-docker-images:
    name: Push Docker images to Docker Hub
    needs: [code_lint, client_checks, sync_check, tests, e2e]
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Get version info
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/*/v}" >> $GITHUB_ENV
            echo "API_TAGS=${{secrets.DOCKER_API_REPO}}:latest,${{secrets.DOCKER_API_REPO}}:${GITHUB_REF#refs/*/v}" >> $GITHUB_ENV
            echo "UI_TAGS=${{secrets.DOCKER_UI_REPO}}:latest,${{secrets.DOCKER_UI_REPO}}:${GITHUB_REF#refs/*/v}" >> $GITHUB_ENV
          fi

      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_ENV=${{ env.VERSION == 'dev' && 'local' || 'production' }}
            COMPOSER_FLAGS=${{ env.VERSION == 'dev' && '--optimize-autoloader --no-interaction' || '--no-dev --optimize-autoloader --no-interaction' }}
            APP_VERSION=${{ env.VERSION }}
          tags: ${{ env.API_TAGS }}
          cache-from: type=registry,ref=${{secrets.DOCKER_API_REPO}}:dev
          cache-to: type=inline

      - name: Build and push Client image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.client
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ env.VERSION }}
          tags: ${{ env.UI_TAGS }}
          cache-from: type=registry,ref=${{secrets.DOCKER_UI_REPO}}:dev
          cache-to: type=inline
